<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph / Social sharing -->
  <meta property="og:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% if page.image %}<meta property="og:image" content="{{ page.image }}">{% endif %}
  <meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Google Analytics (add your GA4 ID) -->
  <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script> -->
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/tools' | relative_url }}">Tools</a>
        <a href="{{ '/furniture' | relative_url }}">Furniture</a>
        <a href="{{ '/home-decor' | relative_url }}">Home Decor</a>
      </nav>
    </div>
  </header>

  <div class="disclosure-banner">
    {{ site.affiliate_disclosure }}
  </div>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site.affiliate_disclosure }}</p>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>

</body>
</html>
